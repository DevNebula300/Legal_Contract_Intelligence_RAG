services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: legalrag
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  qdrant:
    image: qdrant/qdrant
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant_data:/qdrant/storage"]
volumes:
  pgdata:
  qdrant_data: